repos:
  - repo: local
    hooks:
      - id: sops-secrets
        name: Encrypt and stage configured secrets with SOPS
        entry: python scripts/secrets/secrets_manager.py pre-commit
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
      - id: clang-format
        name: Format C++ with clang-format
        entry: python scripts/quality/run_clang_format.py
        language: python
        files: '\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$'
