name: Clang-Tidy auto-fix on main

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".clang-format"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "cmake/**"
      - "scripts/quality/run_clang_format.py"
      - "scripts/quality/run_clang_tidy.py"
      - "scripts/build/check-linux-build-dependencies.sh"

permissions:
  contents: write

jobs:
  clang-tidy:
    name: Fix and lint merged C++
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install analysis dependencies
        run: |
          bash scripts/build/check-linux-build-dependencies.sh --install
          sudo apt-get install --yes clang-format clang-tidy

      - name: Configure compilation database
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Generate JUCE headers and validate compilation
        run: cmake --build build --target PracticeTakes --parallel

      - name: Apply safe clang-tidy fixes
        shell: bash
        run: |
          # clang-tidy can return a non-zero status while still applying valid
          # fix-its. Preserve those edits and verify unresolved findings later.
          python3 scripts/quality/run_clang_tidy.py --fix src/*.cpp || true

      - name: Format automatic edits
        run: python3 scripts/quality/run_clang_format.py src/*.cpp src/*.h

      - name: Validate automatic edits
        run: |
          cmake --build build --target PracticeTakes --parallel
          python3 scripts/quality/run_clang_tidy.py src/*.cpp

      - name: Commit automatic fixes
        shell: bash
        run: |
          if git diff --quiet -- src; then
            echo "clang-tidy did not produce any source changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "chore: apply clang-tidy automatic fixes"
          git push origin HEAD:main

