name: Build desktop packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: Optional branch, tag, or commit to build
        required: false
        default: ""
        type: string
      version:
        description: Optional temporary semantic version for release preparation
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      ref:
        description: Optional branch, tag, or commit to build
        required: false
        default: ""
        type: string
      version:
        description: Optional temporary semantic version for release preparation
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    container: debian:13
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Bootstrap Debian runner
        run: |
          apt-get update
          apt-get install --yes ca-certificates ccache git python3

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Restore Linux compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.ref || github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --max-size=1G
          ccache --zero-stats

      - name: Apply requested release version
        if: ${{ inputs.version != '' }}
        run: python3 scripts/release/version.py set "${{ inputs.version }}"

      - name: Read application version
        id: version
        shell: bash
        run: echo "version=$(python3 scripts/release/version.py current)" >> "${GITHUB_OUTPUT}"

      - name: Install Linux build dependencies
        run: bash scripts/build/check-linux-build-dependencies.sh --install

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DPRACTICE_TAKES_PACKAGE_FILE_NAME="PracticeTakes-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}"

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Report compiler cache performance
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --build-config "${BUILD_TYPE}" --output-on-failure

      - name: Package
        shell: bash
        run: |
          artifact_name="PracticeTakes-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}"
          package_path="dist/${artifact_name}.deb"
          expected_architecture="${{ matrix.arch }}"

          if [[ "${expected_architecture}" == "x64" ]]; then
            expected_architecture=amd64
          fi

          cpack --config build/CPackConfig.cmake \
            -G DEB \
            -B dist

          if [[ ! -f "${package_path}" ]]; then
            echo "Expected Debian package was not created: ${package_path}" >&2
            exit 1
          fi

          actual_architecture="$(dpkg-deb --field "${package_path}" Architecture)"
          if [[ "${actual_architecture}" != "${expected_architecture}" ]]; then
            echo "Expected ${expected_architecture} package, got ${actual_architecture}." >&2
            exit 1
          fi

          dependencies="$(dpkg-deb --field "${package_path}" Depends)"
          if [[ -z "${dependencies}" ]]; then
            echo "The Debian package has no generated runtime dependencies." >&2
            exit 1
          fi

          dpkg-deb --contents "${package_path}" | grep -F "./usr/bin/PracticeTakes"
          dpkg-deb --contents "${package_path}" | \
            grep -F "./usr/share/applications/org.derekrneilson.practicetakes.desktop"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PracticeTakes-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          path: dist/PracticeTakes-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.deb
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  windows:
    name: Windows ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            arch: x64
            msvc_arch: amd64
          - runner: windows-11-arm
            arch: arm64
            msvc_arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Restore Windows compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.ref || github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch }}-

      - name: Apply requested release version
        if: ${{ inputs.version != '' }}
        shell: pwsh
        run: python scripts/release/version.py set "${{ inputs.version }}"

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $version = (python scripts/release/version.py current).Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install ccache nsis --yes --no-progress
          ccache --max-size=1G
          ccache --zero-stats

      - name: Configure
        shell: pwsh
        run: |
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -property installationPath
          & "$vsInstallPath\Common7\Tools\Launch-VsDevShell.ps1" `
            -Arch "${{ matrix.msvc_arch }}" `
            -HostArch amd64 `
            -SkipAutomaticLocation

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE="${env:BUILD_TYPE}" `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            -DPRACTICE_TAKES_PACKAGE_FILE_NAME="PracticeTakes-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}"

      - name: Build
        shell: pwsh
        run: |
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -property installationPath
          & "$vsInstallPath\Common7\Tools\Launch-VsDevShell.ps1" `
            -Arch "${{ matrix.msvc_arch }}" `
            -HostArch amd64 `
            -SkipAutomaticLocation

          cmake --build build --config "${env:BUILD_TYPE}" --parallel

      - name: Report compiler cache performance
        shell: pwsh
        run: ccache --show-stats

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --build-config "${env:BUILD_TYPE}" --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $artifactName = "PracticeTakes-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}"
          $installerPath = "dist/$artifactName.exe"

          cpack --config build/CPackConfig.cmake `
            -G NSIS `
            -B dist `
            -C "${env:BUILD_TYPE}"

          if (-not (Test-Path -LiteralPath $installerPath -PathType Leaf)) {
            throw "Expected Windows installer was not created: $installerPath"
          }

          $nsisScript = Get-ChildItem -Path dist -Recurse -File -Filter *.nsi |
            Select-Object -First 1
          if (-not $nsisScript) {
            throw "CPack did not leave an NSIS script for shortcut verification."
          }

          $nsisContent = Get-Content -LiteralPath $nsisScript.FullName -Raw
          if ($nsisContent -notmatch [regex]::Escape("Practice Takes.lnk") -or
              $nsisContent -notmatch [regex]::Escape("PracticeTakes.exe")) {
            throw "The Windows installer does not create the Practice Takes Start Menu shortcut."
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PracticeTakes-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}
          path: dist/PracticeTakes-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}.exe
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  macos:
    name: macOS ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            name: Intel x64
            arch: x64
            cmake_arch: x86_64
          - runner: macos-15
            name: Apple Silicon ARM64
            arch: arm64
            cmake_arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Restore macOS compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.ref || github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install ccache
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install ccache
          ccache --max-size=1G
          ccache --zero-stats

      - name: Apply requested release version
        if: ${{ inputs.version != '' }}
        run: python3 scripts/release/version.py set "${{ inputs.version }}"

      - name: Read application version
        id: version
        shell: bash
        run: echo "version=$(python3 scripts/release/version.py current)" >> "${GITHUB_OUTPUT}"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Report compiler cache performance
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --build-config "${BUILD_TYPE}" --output-on-failure

      - name: Package
        run: |
          app_path="$(find build -type d -name 'PracticeTakes.app' -print -quit)"

          if [[ -z "${app_path}" ]]; then
            echo "PracticeTakes.app was not found after the build." >&2
            exit 1
          fi

          artifact_name="PracticeTakes-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}"
          mkdir -p dist
          cp README.md LICENSE "${app_path}/Contents/Resources/"
          codesign --force --deep --sign - "${app_path}"
          pkgbuild \
            --component "${app_path}" \
            --identifier org.derekrneilson.practicetakes.pkg \
            --version "${{ steps.version.outputs.version }}" \
            --install-location /Applications \
            "dist/${artifact_name}.pkg"

          pkgutil --payload-files "dist/${artifact_name}.pkg" | \
            grep -F "PracticeTakes.app/Contents/MacOS/PracticeTakes"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PracticeTakes-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          path: dist/PracticeTakes-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.pkg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  release-assets:
    name: Assemble release artifact bundle
    needs:
      - linux
      - windows
      - macos
    runs-on: ubuntu-24.04

    steps:
      - name: Check out build source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Apply requested release version
        if: ${{ inputs.version != '' }}
        run: python3 scripts/release/version.py set "${{ inputs.version }}"

      - name: Read build metadata
        id: metadata
        shell: bash
        run: |
          echo "version=$(python3 scripts/release/version.py current)" >> "${GITHUB_OUTPUT}"
          echo "source_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Download platform artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: PracticeTakes-${{ steps.metadata.outputs.version }}-*
          path: release-assets
          merge-multiple: true

      - name: Verify and checksum release assets
        shell: bash
        run: |
          version="${{ steps.metadata.outputs.version }}"

          expected_files=(
            "PracticeTakes-${version}-linux-x64.deb"
            "PracticeTakes-${version}-linux-arm64.deb"
            "PracticeTakes-${version}-windows-x64.exe"
            "PracticeTakes-${version}-windows-arm64.exe"
            "PracticeTakes-${version}-macos-x64.pkg"
            "PracticeTakes-${version}-macos-arm64.pkg"
          )

          for file in "${expected_files[@]}"; do
            if [[ ! -f "release-assets/${file}" ]]; then
              echo "Missing expected build artifact: ${file}" >&2
              exit 1
            fi
          done

          actual_count="$(find release-assets -maxdepth 1 -type f -name 'PracticeTakes-*' | wc -l)"
          if [[ "${actual_count}" -ne "${#expected_files[@]}" ]]; then
            echo "Expected ${#expected_files[@]} platform packages, found ${actual_count}." >&2
            find release-assets -maxdepth 1 -type f -print >&2
            exit 1
          fi

          if [[ "$(dpkg-deb --field "release-assets/PracticeTakes-${version}-linux-x64.deb" Architecture)" != "amd64" ]]; then
            echo "The Linux x64 artifact is not an amd64 Debian package." >&2
            exit 1
          fi

          if [[ "$(dpkg-deb --field "release-assets/PracticeTakes-${version}-linux-arm64.deb" Architecture)" != "arm64" ]]; then
            echo "The Linux ARM64 artifact is not an arm64 Debian package." >&2
            exit 1
          fi

          (
            cd release-assets
            sha256sum PracticeTakes-* > SHA256SUMS.txt
          )

          {
            echo "Version: ${version}"
            echo "Source SHA: ${{ steps.metadata.outputs.source_sha }}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > release-assets/BUILD-METADATA.txt

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: PracticeTakes-${{ steps.metadata.outputs.version }}-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
