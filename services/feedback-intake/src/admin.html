<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Practice Takes feedback</title>
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <header>
    <strong>Feedback triage</strong>
    <span>{{ADMIN_USER}}</span>
  </header>
  <main>
    <section class="operations-panel" aria-labelledby="operations-title">
      <div>
        <strong id="operations-title">Service operations (last 24 hours)</strong>
        <span id="operations-summary">Loading operational status…</span>
      </div>
      <button id="run-retention" type="button">Run retention now</button>
      <span id="retention-status"></span>
    </section>
    <details class="create-panel">
      <summary>Add feedback</summary>
      <form id="create" class="create-form">
        <select name="category" required>
          <option value="bug">Bug</option>
          <option value="idea">Idea</option>
          <option value="usability">Usability</option>
          <option value="other">Other</option>
        </select>
        <input name="appVersion" required placeholder="App version (1.2.3)">
        <input name="contactEmail" type="email" placeholder="Contact email">
        <input name="submittedAt" type="datetime-local">
        <textarea name="message" required placeholder="Feedback message"></textarea>
        <textarea name="diagnosticContext" placeholder="Diagnostic context"></textarea>
        <button>Create</button>
        <span id="create-status"></span>
      </form>
    </details>
    <form class="filters" id="filters">
      <input name="q" placeholder="Search feedback, notes, tags">
      <select name="category">
        <option value="">All categories</option>
        <option>bug</option>
        <option>idea</option>
        <option>usability</option>
        <option>other</option>
      </select>
      <input name="appVersion" placeholder="App version">
      <input name="platform" placeholder="Platform">
      <input name="from" type="date">
      <input name="to" type="date">
      <select name="status">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="needs_review">Needs review</option>
        <option value="planned">Planned</option>
        <option value="duplicate">Duplicate</option>
        <option value="resolved">Resolved</option>
        <option value="declined">Declined</option>
      </select>
      <select name="quarantined">
        <option value="">All review states</option>
        <option value="true">Quarantined only</option>
      </select>
      <button>Search</button>
    </form>
    <div class="actions">
      <button id="save-all" type="button">Save all</button>
      <button id="export" type="button">Export selected</button>
      <button id="delete-selected" class="danger" type="button">Delete selected</button>
      <a class="button-link" href="/admin/audit">Admin receipts</a>
      <span id="count"></span>
      <span id="bulk-status"></span>
    </div>
    <section id="results" aria-live="polite"></section>
  </main>
  <script src="/admin.js" defer></script>
</body>
</html>
